services:
  dev:
    image: mcr.microsoft.com/devcontainers/dotnet:10.0
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    ports:
      - "5173:5173"
      - "8080:8080"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
